name: Build P3 Historia Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 4"
    - cron: "0 11 * * 4"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Skip runs outside Thursday 12:00 Stockholm time
        id: stockholm-time
        run: |
          current_hour="$(TZ=Europe/Stockholm date +%H)"
          current_day="$(TZ=Europe/Stockholm date +%u)"
          if [ "$current_day" != "4" ] || [ "$current_hour" != "12" ]; then
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_build=true" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: steps.stockholm-time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.stockholm-time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: steps.stockholm-time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        run: python -m pip install --requirement requirements.txt

      - name: Build feed
        if: steps.stockholm-time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        env:
          FEED_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/feed.xml
        run: python scripts/build_feed.py

      - name: Commit and push updated feed
        if: steps.stockholm-time.outputs.run_build == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          if git diff --quiet -- docs/feed.xml; then
            echo "No feed changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git commit -m "Update generated P3 Historia feed"
          git push
