name: Build P3 Historia Feed

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are UTC and can start late, so both DST candidates run.
    # The generator only commits when the feed actually changes.
    - cron: "0 10 * * 4"
    - cron: "0 11 * * 4"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Build feed
        env:
          FEED_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/feed.xml
        run: python scripts/build_feed.py

      - name: Commit and push updated feed
        run: |
          if git diff --quiet -- docs/feed.xml; then
            echo "No feed changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git commit -m "Update generated P3 Historia feed"
          git push
